services:
  # PostgreSQL Database Container
  postgres:
    image: postgres:16-alpine  # Use PostgreSQL 16 (lightweight Alpine version)
    container_name: ${POSTGRES_CONTAINER_NAME}  # Container name for easy reference
    
    # Environment variables for PostgreSQL
    environment:
      POSTGRES_USER: ${POSTGRES_USER}      # Database user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}   # Database password from .env
      POSTGRES_DB: ${POSTGRES_DB}          # Database name
      POSTGRES_INITDB_ARGS: "-c max_connections=100"  # Performance tuning
    
    # Port mapping: container port -> host port
    ports:
      - "5432:5432"  # PostgreSQL runs on port 5432
    
    # Volume for persistent data (survives container restart)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
    # Health check - ensures DB is ready before app connects
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    
    # Restart policy
    restart: unless-stopped

  # pgAdmin - Web UI for PostgreSQL Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ${PGADMIN_CONTAINER_NAME:-qr_pgadmin}
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

# Named volume - stores database files on your machine
volumes:
  postgres_data:
    driver: local
